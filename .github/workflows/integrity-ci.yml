name: DAG integrity

on:
  pull_request:
  push:
    branches: [main]

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Airflow + requirements
        run: |
          python -m pip install --upgrade pip
          # Match the Airflow line on the class VM (2.9.2 at time of writing;
          # bump in lockstep with datatrack/bicep/modules/vm-airflow.bicep).
          pip install "apache-airflow==2.9.2" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.2/constraints-3.13.txt"
          pip install -r requirements.txt
          pip install pytest

      - name: Run DAG integrity tests
        env:
          AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
        run: pytest tests/test_dag_integrity.py -v
